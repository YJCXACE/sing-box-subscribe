name: Update sing-box config

on:
  schedule:
    - cron: '*/30 * * * *'   # 每30分钟自动跑一次
  workflow_dispatch: {}      # 允许在Actions页面手动点击运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject real subscription URL into providers.json
        env:
          SUB_URL: ${{ secrets.SUB_URL }}
        run: |
          python3 -c "import os; p='providers.json'; c=open(p,encoding='utf-8').read(); c=c.replace('__SUB_URL__', os.environ['SUB_URL']); open(p,'w',encoding='utf-8').write(c)"
          echo "providers.json 已写入真实订阅地址"

      - name: Locate custom template index
        id: tpl
        run: |
          IDX=$(python3 -c "import os; files=sorted(f[:-5] for f in os.listdir('config_template') if f.endswith('.json')); print(files.index('zzz_custom_claude_template'))")
          echo "index=$IDX" >> "$GITHUB_OUTPUT"
          echo "模板序号: $IDX"

      - name: Generate config
        run: |
          mkdir -p dist
          python main.py --template_index=${{ steps.tpl.outputs.index }}
          echo "----- 生成结果前300字符 -----"
          head -c 300 dist/config.json
          echo ""
          python -c "import json; json.load(open('dist/config.json', encoding='utf-8'))"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/config.json
          git diff --cached --quiet || git commit -m "auto update config $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
