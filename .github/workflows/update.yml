name: Update sing-box config

on:
  schedule:
    - cron: '*/30 * * * *'   # 每30分钟自动跑一次
  workflow_dispatch: {}      # 允许在Actions页面手动点击运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start converter locally
        run: |
          pip install flask
          export FLASK_APP=main
          nohup flask run --host 127.0.0.1 --port 5000 > server.log 2>&1 &
          sleep 6
          echo "----- server.log -----"
          cat server.log || true

      - name: Generate config
        env:
          SUB_URL: ${{ secrets.SUB_URL }}
        run: |
          mkdir -p dist
          PORT=5000
          FILE_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/template.json"
          curl -s "http://127.0.0.1:${PORT}/config/${SUB_URL}&file=${FILE_URL}" -o dist/config.json
          echo "----- 生成结果前200字符 -----"
          head -c 200 dist/config.json
          echo ""
          # 简单校验是不是合法JSON,不是的话让任务失败,方便排查
          python -c "import json; json.load(open('dist/config.json', encoding='utf-8'))"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/config.json
          git diff --cached --quiet || git commit -m "auto update config $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
